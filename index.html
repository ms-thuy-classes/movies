<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn with Ms. Thúy – Interactive Video Quiz</title>
    
    <!-- Google Fonts: Poppins & Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== STICKY HEADER / STATS BAR ===== -->
    <header id="stats-header" class="stats-header">
        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-icon">👤</span>
                <span class="stat-label">Name:</span>
                <span id="user-name" class="stat-value">Student</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">✅</span>
                <span class="stat-label">Correct:</span>
                <span id="correct-count" class="stat-value">0 / 0</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">⭐</span>
                <span class="stat-label">Score:</span>
                <span id="score-display" class="stat-value">0.0 / 10</span>
            </div>
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <span id="progress-text" class="progress-text">0%</span>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="main-content" class="main-content">
        <!-- Content will be dynamically generated by JavaScript -->
    </main>

    <!-- ===== POPUP MODAL ===== -->
    <div id="popup-overlay" class="popup-overlay">
        <div class="popup-card">
            <div id="popup-emoji" class="popup-emoji"></div>
            <h2 id="popup-title" class="popup-title"></h2>
            <p id="popup-message" class="popup-message"></p>
            <button id="popup-close" class="popup-close-btn">Continue</button>
        </div>
    </div>

    <!-- ===== CONFETTI CANVAS ===== -->
    <canvas id="confetti-canvas"></canvas>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
