<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson – Learn with Ms. Thúy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="lesson.css">
</head>
<body>

    <!-- Back to Home Button -->
    <a href="index.html" class="back-home-btn" id="back-home" title="Back to Home">
        ← Home
    </a>

    <!-- Stats Header -->
    <header id="stats-header" class="stats-header">
        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-icon">👤</span>
                <input 
                    type="text" 
                    id="user-name" 
                    class="name-input" 
                    placeholder="Your name..." 
                    maxlength="30"
                    autocomplete="off"
                >
            </div>
            <div class="stat-item">
                <span class="stat-icon">✅</span>
                <span class="stat-label">Correct:</span>
                <span id="correct-count" class="stat-value">0 / 0</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">⭐</span>
                <span class="stat-label">Score:</span>
                <span id="score-display" class="stat-value">0.0 / 10</span>
            </div>
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <span id="progress-text" class="progress-text">0%</span>
            </div>
            <button id="theme-toggle" class="theme-toggle-mini" aria-label="Toggle theme">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
        <!-- Loading state -->
        <div id="loading-state" class="loading-state">
            <div class="loader"></div>
            <p>Loading lesson...</p>
        </div>
        
        <!-- Error state -->
        <div id="error-state" class="error-state" style="display:none;">
            <div class="error-icon">⚠️</div>
            <h2>Lesson not found</h2>
            <p>The lesson you're looking for doesn't exist or has been removed.</p>
            <a href="index.html" class="error-btn">← Back to Home</a>
        </div>
    </main>

    <!-- Popup Modal -->
    <div id="popup-overlay" class="popup-overlay">
        <div class="popup-card">
            <div id="popup-emoji" class="popup-emoji"></div>
            <h2 id="popup-title" class="popup-title"></h2>
            <p id="popup-message" class="popup-message"></p>
            <button id="popup-close" class="popup-close-btn">Continue</button>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script src="lesson.js"></script>
</body>
</html>
